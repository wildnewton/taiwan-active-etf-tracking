name: Issue 82 GREEN

on:
  push:
    branches:
      - "fix/82-weight-validation-warnings"

permissions:
  contents: write

jobs:
  green:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix/82-weight-validation-warnings
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Apply implementation
        run: python tools/apply_issue82_green.py

      - name: Run targeted tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_weight_validation_warnings.py \
            tests/test_row_count_validation.py \
            tests/test_min_weight_gate.py \
            tests/test_scraper_freshness_target.py

      - name: Run full suite
        run: PYTHONPATH=. pytest -q

      - name: Commit GREEN implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "feat: treat MoneyDJ weight thresholds as warnings"
          git push origin HEAD:fix/82-weight-validation-warnings
