name: Issue 130 PR staging

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-and-capture:
    if: github.head_ref == 'staging/issue-130-db-only-config'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: staging/issue-130-db-only-config
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply refactor
        run: python scripts/issue130_green_staging.py

      - name: Remove duplicate configuration and staging files
        run: |
          rm data/etf_universe_seed.json
          rm scripts/issue130_green_staging.py
          rm .github/workflows/issue130-green-staging.yml
          rm .github/workflows/issue130-pr-staging.yml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        run: |
          python -m compileall -q scripts tests
          PYTHONPATH=. pytest -q \
            tests/test_db_only_etf_configuration.py \
            tests/test_etf_universe.py \
            tests/test_prelisting_etfs.py \
            tests/test_config.py \
            tests/test_etf_universe_scope_exclusions.py \
            tests/test_report_change_diagnostics.py \
            tests/test_project_organization.py \
            tests/test_readme.py

      - name: Capture full-suite result
        run: |
          set +e
          PYTHONPATH=. pytest -q > issue130_full_suite.txt 2>&1
          status=$?
          echo >> issue130_full_suite.txt
          echo "exit_status=$status" >> issue130_full_suite.txt
          exit 0

      - name: Commit diagnostic candidate
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: capture issue 130 GREEN candidate"
          git push origin HEAD:staging/issue-130-db-only-config
