name: Apply PR 90 date semantics green

on:
  push:
    branches:
      - tooling/pr90-date-semantics-green

permissions:
  contents: write

jobs:
  apply-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Apply minimal date-semantics implementation
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re


          def read(path):
              return Path(path).read_text(encoding="utf-8")


          def write(path, text):
              Path(path).write_text(text, encoding="utf-8")


          def replace_exact(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one exact match, found {count}")
              write(path, text.replace(old, new, 1))


          def replace_regex(path, pattern, replacement):
              text = read(path)
              updated, count = re.subn(pattern, replacement, text, count=1, flags=re.S)
              if count != 1:
                  raise RuntimeError(f"{path}: expected one regex match, found {count}")
              write(path, updated)


          replace_regex(
              "scripts/db.py",
              r"def insert_scrape_run\(run\):.*?\n\ndef get_last_scrape_date",
              '''_USABLE_SCRAPE_STATUSES = {"success", "stale"}


def _scrape_run_should_replace(existing, incoming: dict) -> bool:
    """Keep the newest usable snapshot state for one run-date/ETF row."""
    if existing is None:
        return True

    existing_status, existing_data_date, existing_started_at = existing
    incoming_status = incoming["status"]
    existing_usable = existing_status in _USABLE_SCRAPE_STATUSES
    incoming_usable = incoming_status in _USABLE_SCRAPE_STATUSES

    if incoming_usable and existing_usable:
        incoming_data_date = incoming.get("data_date") or ""
        existing_data_date = existing_data_date or ""
        if incoming_data_date != existing_data_date:
            return incoming_data_date > existing_data_date
        return (incoming.get("started_at") or "") >= (existing_started_at or "")

    if incoming_usable:
        return True
    if existing_usable:
        return False
    return (incoming.get("started_at") or "") >= (existing_started_at or "")


