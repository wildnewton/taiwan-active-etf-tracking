name: PR90 final verification 3

on:
  push:
    branches:
      - fix/73-stale-scrape-status

permissions:
  contents: write

jobs:
  verify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio
      - name: Run targeted and full suites
        run: |
          set +e
          PYTHONPATH=. pytest -q \
            tests/test_pipeline_date_contract.py \
            tests/test_nightly_pipeline.py \
            tests/test_nightly_existing_snapshot_completeness.py \
            tests/test_nightly_try_run.py \
            tests/test_try_run_preexisting_success.py \
            tests/test_retry_stale_scrapes.py \
            tests/test_date_semantics_audit.py \
            tests/test_date_semantics_final_review.py \
            > /tmp/targeted.log 2>&1
          targeted_status=$?
          PYTHONPATH=. pytest -q > /tmp/full.log 2>&1
          full_status=$?
          mkdir -p .tmp
          {
            echo "targeted_status=${targeted_status}"
            cat /tmp/targeted.log
            echo
            echo "full_status=${full_status}"
            cat /tmp/full.log
          } > .tmp/pr90-verification.txt
      - name: Remove temporary workflow and publish results
        run: |
          rm .github/workflows/pr90-final-verification-3.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .tmp/pr90-verification.txt .github/workflows/pr90-final-verification-3.yml
          git commit -m "test: finalize PR90 verification"
          git push origin HEAD:fix/73-stale-scrape-status
