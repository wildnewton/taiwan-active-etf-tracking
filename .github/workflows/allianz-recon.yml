name: Allianz Recon

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Playwright
        run: |
          pip install playwright
          python -m playwright install --with-deps chromium
      - name: Inspect Allianz page
        run: |
          python - <<'PY' | tee allianz-recon.txt
          import asyncio
          import json
          import re
          from playwright.async_api import async_playwright

          URL = "https://etf.allianzgi.com.tw/list-trade"
          TRADE_ENDPOINT = "/webapi/api/Fund/GetFundTradeInfo"

          async def main():
              async with async_playwright() as p:
                  browser = await p.chromium.launch(headless=True)
                  page = await browser.new_page(locale="zh-TW")
                  requests = []
                  responses = []

                  def capture_request(request):
                      if "allianzgi.com.tw/webapi/api" not in request.url:
                          return
                      requests.append({
                          "url": request.url,
                          "method": request.method,
                          "post_data": request.post_data,
                          "headers": {k: v for k, v in request.headers.items() if k.lower() in {"content-type", "requestverificationtoken", "x-requested-with"}},
                      })

                  async def capture_response(response):
                      url = response.url
                      ctype = (response.headers.get("content-type") or "").lower()
                      if "allianzgi.com.tw/webapi/api" not in url:
                          return
                      item = {"url": url, "status": response.status, "content_type": ctype}
                      if "json" in ctype or "/api/" in url.lower():
                          try:
                              text = await response.text()
                              item["body"] = text[:50000]
                          except Exception as exc:
                              item["body_error"] = repr(exc)
                      responses.append(item)

                  page.on("request", capture_request)
                  page.on("response", capture_response)
                  await page.goto(URL, wait_until="domcontentloaded", timeout=60000)
                  await page.wait_for_timeout(5000)

                  current = page.get_by_text(re.compile(r"^00984A\s+主動安聯台灣高息$"))
                  print("=== CURRENT MATCHES ===", await current.count())
                  if await current.count():
                      print((await current.first.evaluate("e => e.parentElement ? e.parentElement.outerHTML : e.outerHTML"))[:20000])
                      await current.first.click()
                      await page.wait_for_timeout(500)

                  option = page.get_by_text(re.compile(r"^00993A\s+主動安聯台灣$"))
                  print("=== 00993A MATCHES ===", await option.count())
                  for index in range(await option.count()):
                      print((await option.nth(index).evaluate("e => e.parentElement ? e.parentElement.outerHTML : e.outerHTML"))[:10000])

                  if await option.count():
                      async with page.expect_response(lambda r: TRADE_ENDPOINT in r.url, timeout=15000) as response_info:
                          await option.last.click()
                      response = await response_info.value
                      print("=== SWITCH RESPONSE URL ===", response.url)
                      print("=== SWITCH RESPONSE BODY ===")
                      print((await response.text())[:100000])
                      await page.wait_for_timeout(1000)

                  print("=== FINAL BODY HEAD ===")
                  print((await page.locator("body").inner_text())[:5000])
                  print("=== REQUESTS ===")
                  print(json.dumps(requests, ensure_ascii=False, indent=2))
                  print("=== RESPONSES ===")
                  print(json.dumps(responses, ensure_ascii=False, indent=2)[:150000])
                  await page.screenshot(path="allianz-page.png", full_page=True)
                  await browser.close()

          asyncio.run(main())
          PY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allianz-recon
          path: |
            allianz-page.png
            allianz-recon.txt
