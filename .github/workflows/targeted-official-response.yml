name: Targeted official response tests

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_official_response_safety.py \
            tests/test_official_response_contracts.py \
            tests/test_ctbc_official_regressions.py \
            tests/test_official_playwright_waits.py \
            tests/test_official.py
