name: Assemble PR90 green staging

on:
  push:
    branches:
      - tmp/pr90-green-staging

permissions:
  contents: write

jobs:
  assemble:
    runs-on: ubuntu-latest
    steps:
      - name: Check out staging branch
        uses: actions/checkout@v4
        with:
          ref: tmp/pr90-green-staging
          fetch-depth: 0

      - name: Apply staged patches
        shell: bash
        run: |
          set -euo pipefail
          for patch in $(find .github/green-patches -type f -name '*.patch' | sort); do
            git apply --check "${patch}"
            git apply "${patch}"
          done
          rm -rf .github/green-patches
          rm -f .github/workflows/stage-green.yml

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Verify implementation
        run: |
          python -m compileall -q scripts tests
          git diff --check
          PYTHONPATH=. pytest -q

      - name: Commit verified tree
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: fix: unify historical universe and snapshot completeness
          branch: tmp/pr90-green-staging
