name: Rename stale log
on:
  push:
    branches:
      - fix/73-stale-scrape-status
permissions:
  contents: write
jobs:
  rename:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
      - run: sed -i 's/PROVISIONAL REPORT:/STALE SCRAPE:/' scripts/nightly_pipeline.py
      - run: |
          rm .github/workflows/rename-stale-log.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add scripts/nightly_pipeline.py .github/workflows/rename-stale-log.yml
          git commit -m 'fix: label stale scrape accurately'
          git push origin HEAD:fix/73-stale-scrape-status
