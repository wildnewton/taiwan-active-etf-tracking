name: Retry date GREEN

on:
  push:
    branches: [fix/73-stale-scrape-status]
    paths: [.github/workflows/retry-date-green.yml]

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python scripts/_retry_date_green.py
      - run: pip install -r requirements.txt pytest-asyncio
      - name: Targeted tests
        env:
          PYTHONPATH: scripts
        run: pytest -q tests/test_retry_execution_date_contract.py tests/test_retry_stale_scrapes.py tests/test_selected_pipeline_retry.py tests/test_pipeline_date_contract.py
      - name: Full suite
        env:
          PYTHONPATH: scripts
        run: pytest -q
      - name: Commit GREEN
        run: |
          rm scripts/_retry_date_green.py
          rm .github/workflows/retry-date-green.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: separate retry execution and target dates"
          git push origin HEAD:fix/73-stale-scrape-status
