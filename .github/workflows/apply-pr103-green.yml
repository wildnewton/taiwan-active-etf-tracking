name: Apply PR 103 GREEN

on:
  push:
    branches:
      - ci-pr90-review-followups
  pull_request:
    branches:
      - ci-pr90-review-followups

permissions:
  contents: write

jobs:
  apply-green:
    name: RED, apply GREEN, and verify
    runs-on: ubuntu-latest

    steps:
      - name: Check out automation branch
        uses: actions/checkout@v4
        with:
          ref: ci-pr90-review-followups
          path: automation

      - name: Check out PR 103 branch
        uses: actions/checkout@v4
        with:
          ref: fix/90-canonical-snapshot-followups
          path: repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: repo
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Apply test fixture corrections
        run: |
          set +e
          {
            git -C repo apply --recount --verbose --check ../automation/.ci/pr103-test-fixtures.patch &&
            git -C repo apply --recount --verbose ../automation/.ci/pr103-test-fixtures.patch &&
            git -C repo apply --exclude=tests/test_canonical_comparability.py --recount --verbose --check ../automation/.ci/pr103-full-fixtures.patch &&
            git -C repo apply --exclude=tests/test_canonical_comparability.py --recount --verbose ../automation/.ci/pr103-full-fixtures.patch &&
            python - <<'PY'
          from pathlib import Path

          path = Path("repo/tests/test_canonical_comparability.py")
          text = path.read_text(encoding="utf-8")

          signature = '    source_type="moneydj_primary",\n):'
          assert text.count(signature) == 1, "canonical helper signature changed"
          text = text.replace(
              signature,
              '    source_type="moneydj_primary",\n    complete=True,\n):',
          )

          helper_boundary = "\n\n\ndef fetch_changes"
          assert text.count(helper_boundary) == 1, "canonical helper boundary changed"
          cash_completion = '''        if complete:
              stock_total = conn.execute(
                  """
                  SELECT COALESCE(SUM(weight_pct), 0.0)
                  FROM etf_daily_holdings
                  WHERE date = ? AND etf_code = ? AND source_type = ?
                  """,
                  (date, etf_code, source_type),
              ).fetchone()[0]
              conn.execute(
                  """
                  INSERT OR REPLACE INTO etf_daily_non_stock_assets (
                      date, etf_code, asset_name, asset_type, weight_pct,
                      source_url, source_type, extraction_method, scraped_at
                  ) VALUES (?, ?, 'Cash', 'cash', ?, 'https://example.test',
                            ?, 'test', '2026-06-24T00:00:00')
                  """,
                  (date, etf_code, 100.0 - stock_total, source_type),
              )
          '''
          text = text.replace(helper_boundary, "\n" + cash_completion + helper_boundary)

          partial_call = '    insert_holding("2026-06-24", "00980A", "2330", "台積電", 100, 10.5, "official_static")'
          assert text.count(partial_call) == 1, "partial-source fixture call changed"
          text = text.replace(
              partial_call,
              '''    insert_holding(
                  "2026-06-24",
                  "00980A",
                  "2330",
                  "台積電",
                  100,
                  10.5,
                  "official_static",
                  complete=False,
              )''',
          )
          path.write_text(text, encoding="utf-8")
          PY
            git -C repo diff --check
          } 2>&1 | tee /tmp/pr103-apply.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Confirm RED regressions still fail
        working-directory: repo
        run: |
          set +e
          PYTHONPATH=. pytest -q tests/test_pr90_review_followups.py 2>&1 | tee /tmp/pr103-red.log
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -eq 0 ]; then
            echo "RED tests unexpectedly passed before implementation"
            exit 1
          fi
          echo "RED confirmed with pytest exit code $status"

      - name: Create test-fixture RED commit locally
        working-directory: repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add \
            tests/test_active_classification.py \
            tests/test_canonical_comparability.py \
            tests/test_change_classification_version.py \
            tests/test_change_diagnostics.py \
            tests/test_changes.py \
            tests/test_flow_adjusted_materiality.py \
            tests/test_fund_flow_adjustment.py \
            tests/test_manager_intent_rollups.py \
            tests/test_report_canonical_sources.py
          git commit -m "test: align fixtures with complete snapshots"

      - name: Apply minimal GREEN patch
        run: |
          git -C repo apply --recount --verbose --check ../automation/.ci/pr103-green.patch
          git -C repo apply --recount --verbose ../automation/.ci/pr103-green.patch
          git -C repo diff --check

      - name: Run targeted tests
        working-directory: repo
        run: |
          set +e
          PYTHONPATH=. pytest -q \
            tests/test_pr90_review_followups.py \
            tests/test_historical_universe_and_snapshot_integrity.py \
            tests/test_holdings_source_of_truth.py \
            tests/test_snapshot_same_source_integrity.py \
            tests/test_daily_snapshot_replacement.py \
            tests/test_changes.py \
            tests/test_manager_intent_rollups.py \
            tests/test_report_canonical_sources.py \
            tests/test_signal_report.py \
            tests/test_etf_universe.py 2>&1 | tee /tmp/pr103-targeted.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Run full test suite
        working-directory: repo
        run: |
          set +e
          PYTHONPATH=. pytest -q 2>&1 | tee /tmp/pr103-full.log
          status=${PIPESTATUS[0]}
          set -e
          exit "$status"

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pr103-test-logs-${{ github.run_id }}
          path: |
            /tmp/pr103-apply.log
            /tmp/pr103-red.log
            /tmp/pr103-targeted.log
            /tmp/pr103-full.log
          if-no-files-found: warn

      - name: Commit and push GREEN implementation
        working-directory: repo
        run: |
          git add scripts/db.py scripts/changes.py scripts/manager_intent.py scripts/report.py scripts/etf_universe.py
          git commit -m "fix: align canonical snapshots and historical windows"
          git push origin HEAD:fix/90-canonical-snapshot-followups
