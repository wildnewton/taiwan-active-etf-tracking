name: Verify issue 99 live

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  live-smoke:
    name: Capital and Nomura live smoke
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          python -m playwright install --with-deps chromium

      - name: Run live scraper smoke
        shell: bash
        run: |
          set -o pipefail
          PYTHONPATH=scripts python scripts/verify_issue99_live.py | tee issue99-live.log

      - name: Upload verification log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue99-live
          path: issue99-live.log
