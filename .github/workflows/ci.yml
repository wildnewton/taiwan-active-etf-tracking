name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/76-uni-president-pane-date
          fetch-depth: 1
          persist-credentials: true

      - name: Remove section whitespace churn
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/scrapers/official.py")
          text = path.read_text(encoding="utf-8")
          sections = (
              "# Static parsers",
              "# API / text parsers",
              "# Browser / API scraper functions",
              "# Unified entry points",
              "# Internal helpers",
          )
          for section in sections:
              text = text.replace(f"{section}\n\n\n", f"{section}\n\n", 1)
          path.write_text(text, encoding="utf-8")
          PY
          if ! git diff --quiet -- scripts/scrapers/official.py; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/scrapers/official.py
            git commit -m "style: keep official scraper diff focused"
            git push origin HEAD:fix/76-uni-president-pane-date
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=. pytest -q
