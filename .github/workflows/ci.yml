name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  apply-green:
    name: Apply Allianz GREEN
    if: github.head_ref == 'issue-72-allianz-official-fallback'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: issue-72-allianz-official-fallback
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply implementation
        run: python tools/apply_issue72_green.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        run: PYTHONPATH=scripts pytest -q tests/test_allianz_official.py tests/test_official.py

      - name: Commit GREEN and restore CI
        run: |
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f .github/workflows/issue72-green.yml
          rm -f .github/issue72-ci-trigger
          rm -f tools/apply_issue72_green.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/scrapers/official.py .github/workflows/ci.yml
          git add -u .github tools
          git commit -m "feat: add Allianz official fallback (GREEN)"
          git push origin HEAD:issue-72-allianz-official-fallback
