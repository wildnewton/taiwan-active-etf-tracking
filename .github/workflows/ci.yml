name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: fix/71-precheck-existing-snapshots
          fetch-depth: 1
          persist-credentials: false
          show-progress: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests and capture output
        id: targeted
        continue-on-error: true
        run: |
          PYTHONPATH=. pytest -q tests/test_skip_existing_expected_snapshots.py tests/test_skip_stale_existing_snapshots.py > issue71-targeted.txt 2>&1

      - name: Upload targeted diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue71-targeted
          path: issue71-targeted.txt

      - name: Enforce targeted result
        if: steps.targeted.outcome != 'success'
        run: exit 1
