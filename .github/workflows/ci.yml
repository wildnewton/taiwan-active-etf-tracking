name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/71-precheck-existing-snapshots
          fetch-depth: 1
          persist-credentials: true

      - name: Apply validated snapshot implementation
        id: apply
        continue-on-error: true
        run: python .github/apply_issue_71_validated_precheck_v2.py > issue71-helper.log 2>&1

      - name: Upload helper diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue71-helper
          path: issue71-helper.log

      - name: Enforce helper result
        if: steps.apply.outcome != 'success'
        run: exit 1

      - name: Commit GREEN
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/db.py scripts/pipeline.py scripts/nightly_pipeline.py tests/test_skip_stale_existing_snapshots.py tests/test_skip_existing_expected_snapshots.py
          git commit -m "fix: skip only validated preexisting snapshots"
          git push origin HEAD:fix/71-precheck-existing-snapshots

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_preexisting_successful_snapshots.py \
            tests/test_try_run_preexisting_success.py \
            tests/test_skip_stale_existing_snapshots.py \
            tests/test_nightly_existing_snapshot_completeness.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q
