name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted Uni-President tests
        run: PYTHONPATH=. pytest -q tests/test_uni_president_date.py tests/test_official.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q
