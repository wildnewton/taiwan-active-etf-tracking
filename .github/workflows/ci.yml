name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: fix/71-precheck-existing-snapshots
          fetch-depth: 1
          persist-credentials: true

      - name: Apply issue 71 implementation
        run: python .github/apply_issue_71_v3.py

      - name: Commit GREEN when needed
        run: |
          if ! git diff --quiet -- scripts/pipeline.py; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/pipeline.py
            git commit -m "fix: skip existing expected snapshots before scrape"
            git push origin HEAD:fix/71-precheck-existing-snapshots
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        run: PYTHONPATH=. pytest -q tests/test_skip_existing_expected_snapshots.py tests/test_skip_stale_existing_snapshots.py

      - name: Run tests
        run: PYTHONPATH=. pytest -q
