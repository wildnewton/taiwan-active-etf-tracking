name: Targeted official scraper tests

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run targeted tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run targeted tests
        id: targeted
        shell: bash
        run: |
          set +e
          PYTHONPATH=. pytest -q \
            tests/test_official_response_contracts.py \
            tests/test_official.py \
            tests/test_ctbc_official_regressions.py \
            tests/test_official_playwright_waits.py \
            > targeted-tests.log 2>&1
          status=$?
          cat targeted-tests.log
          echo "status=$status" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload targeted output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: targeted-tests-log
          path: targeted-tests.log

      - name: Fail when tests failed
        if: steps.targeted.outputs.status != '0'
        run: exit 1
