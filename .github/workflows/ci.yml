name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  apply-green:
    name: Apply issue 99 GREEN
    if: github.event_name == 'pull_request' && github.head_ref == 'issue-99-api-response-method'
    runs-on: ubuntu-latest

    steps:
      - name: Check out head branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Apply minimal implementation
        run: python scripts/apply_issue99_green.py

      - name: Run targeted tests
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_official_response_safety.py \
            tests/test_official.py

      - name: Commit GREEN implementation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/scrapers/official.py
          git diff --cached --quiet && exit 1
          git commit -m "fix: match issuer API response methods (#99)"
          git push origin HEAD:${{ github.head_ref }}
