name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  apply-review-red:
    name: Commit review RED
    if: github.head_ref == 'issue-72-allianz-official-fallback'
    runs-on: ubuntu-latest

    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: issue-72-allianz-official-fallback
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply review tests
        run: python tools/apply_issue72_review.py

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: Verify tests are RED
        run: |
          set +e
          PYTHONPATH=scripts pytest -q tests/test_allianz_official.py > /tmp/review-red.log 2>&1
          status=$?
          set -e
          cat /tmp/review-red.log
          if [ "$status" -eq 0 ]; then
            echo "Review tests unexpectedly passed before implementation"
            exit 1
          fi
          grep -q "service unavailable" /tmp/review-red.log
          grep -q "trade service unavailable" /tmp/review-red.log
          grep -q "playwright_api_request" /tmp/review-red.log

      - name: Commit RED and restore CI
        run: |
          git fetch origin main --depth=1
          git show FETCH_HEAD:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f tools/apply_issue72_review.py
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_allianz_official.py .github/workflows/ci.yml
          git add -u tools
          git commit -m "test: cover Allianz API failure paths (RED)"
          git push origin HEAD:issue-72-allianz-official-fallback
