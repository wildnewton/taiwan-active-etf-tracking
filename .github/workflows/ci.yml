name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Apply PR 79 implementation
        run: python scripts/apply_pr79_green.py

      - name: Run targeted tests
        run: >-
          PYTHONPATH=. pytest -q
          tests/test_prelisting_etfs.py
          tests/test_discover_active_etfs.py
          tests/test_etf_universe.py
          tests/test_pipeline.py
          tests/test_expected_data_date_cutoff.py
          tests/test_report_redesign.py
          tests/test_signal_report.py

      - name: Run full test suite
        run: PYTHONPATH=. pytest -q

      - name: Commit GREEN and restore CI
        if: success()
        run: |
          git checkout origin/main -- .github/workflows/ci.yml
          rm -f .github/workflows/pr79-green.yml scripts/apply_pr79_green.py
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/pipeline.py scripts/report.py tests/test_etf_universe.py .github/workflows/ci.yml .github/workflows/pr79-green.yml scripts/apply_pr79_green.py
          git commit -m 'feat: exclude pre-listing ETFs from active universe (GREEN)'
          git push origin HEAD:fix/59-prelisting-etf-universe
