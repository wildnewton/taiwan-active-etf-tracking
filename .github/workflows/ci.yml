name: Apply reviewed fixes

on:
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  apply:
    name: Apply fixes
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest

    steps:
      - name: Check out PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: true

      - name: Apply and commit reviewed fixes
        run: |
          if [ ! -f .github/review-fixes.patch ]; then
            echo "Patch already applied"
            exit 0
          fi
          git apply .github/review-fixes.patch
          rm .github/review-fixes.patch
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden official response contracts"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
