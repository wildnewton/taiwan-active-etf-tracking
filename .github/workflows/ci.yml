name: CI

on:
  push:
    branches:
      - main
      - master
      - "milestone-*"
      - "ci-*"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytest pytest-asyncio

      - name: Run tests
        run: PYTHONPATH=. pytest -q

  allianz-live:
    name: Allianz live verification
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies and Chromium
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Direct Allianz official smoke
        run: |
          PYTHONPATH=scripts python - <<'PY' | tee /tmp/allianz-live.log
          import asyncio
          import json
          from playwright.async_api import async_playwright
          from scrapers.official import scrape_official_with_browser

          async def main():
              async with async_playwright() as playwright:
                  browser = await playwright.chromium.launch(headless=True)
                  context = await browser.new_context(locale="zh-TW")
                  page = await context.new_page()
                  try:
                      for code in ("00984A", "00993A"):
                          result = await scrape_official_with_browser(code, page)
                          dates = sorted({row.get("date") for row in result.get("stock_rows", [])})
                          summary = {
                              "etf_code": code,
                              "ok": result.get("ok"),
                              "reason": result.get("reason"),
                              "stock_rows": len(result.get("stock_rows", [])),
                              "dates": dates,
                              "total_weight": result.get("total_weight_stock_rows"),
                              "first_stock": (
                                  result.get("stock_rows", [{}])[0].get("stock_code")
                                  if result.get("stock_rows") else None
                              ),
                          }
                          print(json.dumps(summary, ensure_ascii=False))
                          assert result.get("ok") is True, summary
                          assert len(result.get("stock_rows", [])) >= 5, summary
                          assert dates and len(dates) == 1 and dates[0], summary
                          assert all(
                              row.get("etf_code") == code
                              for row in result.get("stock_rows", [])
                          ), summary
                          assert 20 <= result.get("total_weight_stock_rows", 0) <= 110, summary
                  finally:
                      await context.close()
                      await browser.close()

          asyncio.run(main())
          PY

      - name: Full nightly try-run on disposable state
        run: |
          rm -rf /tmp/issue72-production /tmp/issue72-reports
          mkdir -p /tmp/issue72-production
          PYTHONPATH=scripts timeout 1200s python scripts/nightly_pipeline.py \
            --try-run \
            --skip-discovery \
            --db /tmp/issue72-production/active_etf_holdings.sqlite \
            --report-dir /tmp/issue72-reports \
            | tee /tmp/nightly-try-run.log
          grep -q "TRY-RUN complete" /tmp/nightly-try-run.log
          test ! -e /tmp/issue72-production/active_etf_holdings.sqlite
          test ! -e /tmp/issue72-reports

      - name: Upload verification logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: issue72-live-verification
          path: |
            /tmp/allianz-live.log
            /tmp/nightly-try-run.log
