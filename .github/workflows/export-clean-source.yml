name: Export clean PR90 base

on:
  push:
    branches:
      - ci-pr90-clean-final

permissions:
  contents: read

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false
      - run: tar -czf /tmp/source.tar.gz --exclude=.git .
      - uses: actions/upload-artifact@v4
        with:
          name: clean-main-source
          path: /tmp/source.tar.gz
          retention-days: 1
