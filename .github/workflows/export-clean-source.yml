name: Record clean PR90 base tree

on:
  push:
    branches:
      - ci-pr90-clean-final

permissions:
  contents: write

jobs:
  record:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Record main commit and tree
        run: |
          git fetch origin main
          printf '%s\n' "$(git rev-parse origin/main)" > .github/clean-parent-sha.txt
          printf '%s\n' "$(git rev-parse origin/main^{tree})" > .github/clean-parent-tree-sha.txt
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add .github/clean-parent-sha.txt .github/clean-parent-tree-sha.txt
          git commit -m 'chore: record clean PR90 base tree'
          git push
