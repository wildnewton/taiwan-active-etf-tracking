name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

permissions:
  contents: write

jobs:
  diagnose-full-suite:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          path: repo
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint-run
          path: output
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Capture exact CI failures
        working-directory: repo
        shell: bash
        run: |
          python -m pip install -q -r requirements.txt pytest pytest-asyncio
          set +e
          PYTHONPATH=. pytest -q --tb=short > /tmp/full-suite-ci.log 2>&1
          status=$?
          cp /tmp/full-suite-ci.log ../output/full-suite-ci-error.txt
          cd ../output
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add full-suite-ci-error.txt
          git commit -m 'chore: capture exact JPMorgan CI failures' || true
          git push origin HEAD:probe/jpmorgan-excel-endpoint-run
          exit $status
