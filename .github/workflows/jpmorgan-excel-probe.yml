name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

permissions:
  contents: write

jobs:
  diagnose-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          path: repo
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint
          path: helper
          fetch-depth: 1
          show-progress: false
          sparse-checkout: tools/jpmorgan_excel_refactor.py
      - name: Apply direct refactor
        working-directory: repo
        shell: bash
        run: |
          set +e
          python ../helper/tools/jpmorgan_excel_refactor.py > /tmp/refactor.log 2>&1
          status=$?
          cat /tmp/refactor.log
          exit $status
