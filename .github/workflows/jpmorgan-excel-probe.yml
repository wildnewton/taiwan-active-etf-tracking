name: JPMorgan Excel probe

on:
  push:
    branches:
      - probe/jpmorgan-excel-endpoint

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Download workbook
        shell: bash
        run: |
          set -euxo pipefail
          url='https://am.jpmorgan.com/FundsMarketingHandler/excel?type=holding_pcf&cusip=TW00000401A1&country=tw&role=twetf&locale=zh-TW&date=2026-07-22'
          curl -fsSL --retry 3 --retry-all-errors -D headers.txt "$url" -o holding.bin
          cat headers.txt
          file holding.bin
          wc -c holding.bin
          xxd -l 32 holding.bin
      - name: Inspect workbook
        shell: bash
        run: |
          python -m pip install openpyxl
          python - <<'PY'
          from openpyxl import load_workbook
          wb = load_workbook('holding.bin', read_only=True, data_only=True)
          print('sheets=', wb.sheetnames)
          for ws in wb.worksheets:
              print('SHEET', ws.title, ws.max_row, ws.max_column)
              for row in ws.iter_rows(min_row=1, max_row=min(ws.max_row, 30), values_only=True):
                  print(repr(row))
          PY
