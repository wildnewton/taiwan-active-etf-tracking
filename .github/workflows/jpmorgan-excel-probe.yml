name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

permissions:
  contents: write

jobs:
  diagnose-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          path: repo
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint
          path: helper
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint-run
          path: output
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Apply and capture targeted tests
        working-directory: repo
        shell: bash
        run: |
          python ../helper/tools/jpmorgan_excel_refactor.py
          python -m pip install -q -r requirements.txt
          set +e
          PYTHONPATH=scripts pytest -q tests/test_jpmorgan_excel.py > /tmp/pytest.log 2>&1
          status=$?
          cp /tmp/pytest.log ../output/pytest-error.txt
          git diff > ../output/generated-refactor.diff
          cd ../output
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add pytest-error.txt generated-refactor.diff
          git commit -m 'chore: capture JPMorgan test diagnostic' || true
          git push origin HEAD:probe/jpmorgan-excel-endpoint-run
          exit $status
