name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

permissions:
  contents: write

jobs:
  diagnose-green:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          path: repo
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint
          path: helper
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint-run
          path: output
          fetch-depth: 1
          show-progress: false
      - name: Capture direct refactor result
        working-directory: repo
        shell: bash
        run: |
          set +e
          python ../helper/tools/jpmorgan_excel_refactor.py > /tmp/refactor.log 2>&1
          status=$?
          cp /tmp/refactor.log ../output/refactor-error.txt
          cd ../output
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add refactor-error.txt
          git commit -m 'chore: capture JPMorgan refactor diagnostic' || true
          git push origin HEAD:probe/jpmorgan-excel-endpoint-run
          exit $status
