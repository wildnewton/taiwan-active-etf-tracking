name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

permissions:
  contents: write

jobs:
  fix-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          path: repo
          fetch-depth: 1
          show-progress: false
      - uses: actions/checkout@v4
        with:
          ref: probe/jpmorgan-excel-endpoint
          path: helper
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Apply contract fix
        working-directory: repo
        run: python ../helper/tools/fix_jpmorgan_target_date_contract.py
      - name: Install CI dependencies
        working-directory: repo
        run: python -m pip install -q -r requirements.txt pytest pytest-asyncio
      - name: Run regression tests
        working-directory: repo
        run: |
          PYTHONPATH=. pytest -q \
            tests/test_jpmorgan_excel.py \
            tests/test_ctbc_official_regressions.py::test_browser_method_reaches_official_browser_scraper \
            tests/test_row_count_validation.py::test_low_moneydj_row_count_uses_browser_official_fallback_when_available \
            tests/test_scraper.py::test_scrape_with_browser_stale_moneydj_uses_fresh_official_browser
      - name: Commit contract fix
        working-directory: repo
        run: |
          git diff --check
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add scripts/scraper.py
          git commit -m 'fix: preserve non-JPMorgan browser call contract'
          git push origin HEAD:refactor/jpmorgan-excel-endpoint
