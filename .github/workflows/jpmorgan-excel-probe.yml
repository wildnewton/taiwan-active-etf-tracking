name: JPMorgan Excel probe

on:
  pull_request:
    branches:
      - feature/jpmorgan-00401a-scraper

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refactor/jpmorgan-excel-endpoint
          fetch-depth: 1
          show-progress: false
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: python -m pip install -q -r requirements.txt
      - name: Compile
        run: python -m compileall -q scripts tests
      - name: Targeted tests
        run: PYTHONPATH=scripts pytest -q tests/test_jpmorgan_excel.py
      - name: Full test suite
        run: PYTHONPATH=scripts pytest -q
      - name: Live JPMorgan Excel smoke
        run: |
          PYTHONPATH=scripts python - <<'PY'
          from datetime import date
          from scrapers.official import scrape_jpmorgan_excel

          result = scrape_jpmorgan_excel("00401A", date(2026, 7, 22))
          summary = {
              "ok": result["ok"],
              "reason": result["reason"],
              "stock_rows": len(result["stock_rows"]),
              "non_stock_rows": len(result["non_stock_rows"]),
              "total_weight": result["total_weight_all_rows"],
              "first_stock": result["stock_rows"][0]["stock_code"] if result["stock_rows"] else None,
              "last_stock": result["stock_rows"][-1]["stock_code"] if result["stock_rows"] else None,
              "date": result["all_rows"][0]["date"] if result["all_rows"] else None,
          }
          print(summary)
          assert summary == {
              "ok": True,
              "reason": "ok",
              "stock_rows": 64,
              "non_stock_rows": 3,
              "total_weight": 99.99,
              "first_stock": "2330",
              "last_stock": "2615",
              "date": "2026/07/22",
          }
          PY
