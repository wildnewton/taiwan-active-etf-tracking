name: Run PR 90 date semantics helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-green:
    runs-on: ubuntu-latest
    steps:
      - name: Check out helper branch
        uses: actions/checkout@v4
        with:
          ref: tooling/pr90-date-semantics-green
          path: helper

      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
          path: target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r target/requirements.txt pytest

      - name: Extract and run implementation script
        run: |
          python - <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path("helper/.github/workflows/apply-pr90-date-semantics.yml").read_text(encoding="utf-8")
          start_marker = "          python - <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Run targeted tests"
          start = workflow.index(start_marker) + len(start_marker)
          end = workflow.index(end_marker, start)
          script = textwrap.dedent(workflow[start:end])
          Path("/tmp/apply_pr90_date_semantics.py").write_text(script, encoding="utf-8")
          PY
          cd target
          python /tmp/apply_pr90_date_semantics.py

      - name: Run targeted tests
        working-directory: target
        run: |
          PYTHONPATH=scripts pytest -q \
            tests/test_date_semantics_audit.py \
            tests/test_changes.py \
            tests/test_cutoff_freshness_consumers.py \
            tests/test_retry_stale_scrapes.py \
            tests/test_stale_scrape_status.py \
            tests/test_stale_status_review_followups.py \
            tests/test_nightly_pipeline.py \
            tests/test_scrape_run_preservation.py

      - name: Run full test suite
        working-directory: target
        run: PYTHONPATH=scripts pytest -q

      - name: Commit and push GREEN implementation
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts tests
          git commit -m "fix: align date semantics across pipeline"
          git push origin HEAD:fix/73-stale-scrape-status
