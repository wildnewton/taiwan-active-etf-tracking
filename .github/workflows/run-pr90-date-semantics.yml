name: Run PR 90 date semantics helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-green:
    runs-on: ubuntu-latest
    steps:
      - name: Check out helper branch
        uses: actions/checkout@v4
        with:
          ref: tooling/export-pr90-source
          path: helper

      - name: Check out target branch
        uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
          path: target

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r target/requirements.txt pytest

      - name: Assemble and verify patch
        run: |
          cat helper/.github/patches/pr90-date-semantics.patch.part* > /tmp/pr90-date-semantics.patch
          echo "946d7403983eda84a85bbc2679d47baf249868c328626bd133038e903c4a5e35  /tmp/pr90-date-semantics.patch" | sha256sum --check

      - name: Apply implementation
        working-directory: target
        run: |
          git apply --check /tmp/pr90-date-semantics.patch
          git apply /tmp/pr90-date-semantics.patch

      - name: Run targeted tests
        working-directory: target
        run: |
          PYTHONPATH=scripts pytest -q \
            tests/test_date_semantics_audit.py \
            tests/test_changes.py \
            tests/test_cutoff_freshness_consumers.py \
            tests/test_retry_stale_scrapes.py \
            tests/test_stale_scrape_status.py \
            tests/test_stale_status_review_followups.py \
            tests/test_nightly_pipeline.py \
            tests/test_scrape_run_preservation.py \
            tests/test_backfill_changes.py \
            tests/test_nightly_try_run.py \
            tests/test_signal_report.py \
            tests/test_pipeline.py::test_scrape_run_records_per_etf_data_date_not_first_success_date

      - name: Run full test suite
        working-directory: target
        run: PYTHONPATH=scripts pytest -q

      - name: Commit and push GREEN implementation
        working-directory: target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts tests
          git commit -m "fix: align date semantics across pipeline"
          git push origin HEAD:fix/73-stale-scrape-status
