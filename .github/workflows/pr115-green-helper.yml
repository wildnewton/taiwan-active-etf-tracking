name: PR115 GREEN helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/90-nightly-persisted-coverage
          fetch-depth: 0
          persist-credentials: true

      - name: Align stale nightly test with persisted coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_nightly_pipeline.py")
          text = path.read_text(encoding="utf-8")

          old_helper = '''def _run_main(db_path, report_dir):
              import importlib.util
              with patch("changes.get_latest_valid_date", return_value="2026-06-26"), patch(
                  "db.get_target_snapshot_coverage",
                  return_value={
                      "actual_count": 19,
                      "expected_count": 19,
                      "missing_etfs": [],
                  },
              ):
          '''
          old_helper = old_helper.replace("              ", "    ")
          new_helper = '''def _run_main(db_path, report_dir, coverage=None):
              import importlib.util
              coverage = coverage or {
                  "actual_count": 19,
                  "expected_count": 19,
                  "missing_etfs": [],
              }
              with patch("changes.get_latest_valid_date", return_value="2026-06-26"), patch(
                  "db.get_target_snapshot_coverage",
                  return_value=coverage,
              ):
          '''
          new_helper = new_helper.replace("              ", "    ")
          assert text.count(old_helper) == 1
          text = text.replace(old_helper, new_helper, 1)

          old_call = '''        _run_main(str(tmp_path / "t.sqlite3"), str(tmp_path / "r"))

              out = capsys.readouterr().out
              assert "預期" in out and "19" in out and "13" in out, f"Expected completeness warning in:\n{out}"
              assert "00401A" in out, f"Expected failing ETF code in output:\n{out}"
          '''
          old_call = old_call.replace("              ", "    ")
          new_call = '''        _run_main(
                  str(tmp_path / "t.sqlite3"),
                  str(tmp_path / "r"),
                  coverage={
                      "actual_count": 13,
                      "expected_count": 19,
                      "missing_etfs": ["00401A"],
                  },
              )

              out = capsys.readouterr().out
              assert "⚠️ 資料不完整: 預期 19 檔 ETF，實際可用 13 檔" in out
              assert "缺少目標日持倉: 00401A" in out
          '''
          new_call = new_call.replace("              ", "    ")
          assert text.count(old_call) == 1
          text = text.replace(old_call, new_call, 1)

          path.write_text(text, encoding="utf-8")
          PY

      - name: Commit test alignment
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_nightly_pipeline.py
          git commit -m "test: align nightly warning with persisted coverage"
          git push origin HEAD:fix/90-nightly-persisted-coverage
