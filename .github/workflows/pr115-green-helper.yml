name: PR115 GREEN helper

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/90-nightly-persisted-coverage
          fetch-depth: 0
          persist-credentials: true

      - name: Align stale nightly test with persisted coverage
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_nightly_pipeline.py")
          lines = path.read_text(encoding="utf-8").splitlines()

          helper_index = lines.index("def _run_main(db_path, report_dir):")
          lines[helper_index] = "def _run_main(db_path, report_dir, coverage=None):"
          import_index = helper_index + 1
          assert lines[import_index].strip() == "import importlib.util"
          lines[import_index + 1:import_index + 1] = [
              "    coverage = coverage or {",
              '        "actual_count": 19,',
              '        "expected_count": 19,',
              '        "missing_etfs": [],',
              "    }",
          ]

          coverage_patch = next(
              i for i in range(helper_index, helper_index + 30)
              if '"db.get_target_snapshot_coverage"' in lines[i]
          )
          assert lines[coverage_patch + 1].strip() == "return_value={"
          end = coverage_patch + 2
          while lines[end].strip() != "},":
              end += 1
          lines[coverage_patch + 1:end + 1] = ["        return_value=coverage,"]

          test_index = lines.index("def test_warns_when_incomplete_scrape(capsys, tmp_path):")
          next_test = next(
              i for i in range(test_index + 1, len(lines))
              if lines[i].startswith("def test_")
          )
          call_index = next(
              i for i in range(test_index, next_test)
              if '_run_main(str(tmp_path / "t.sqlite3"), str(tmp_path / "r"))' in lines[i]
          )
          lines[call_index:call_index + 1] = [
              "        _run_main(",
              '            str(tmp_path / "t.sqlite3"),',
              '            str(tmp_path / "r"),',
              "            coverage={",
              '                "actual_count": 13,',
              '                "expected_count": 19,',
              '                "missing_etfs": ["00401A"],',
              "            },",
              "        )",
          ]

          next_test = next(
              i for i in range(test_index + 1, len(lines))
              if lines[i].startswith("def test_")
          )
          first_assert = next(
              i for i in range(test_index, next_test)
              if lines[i].strip().startswith('assert "預期"')
          )
          assert "00401A" in lines[first_assert + 1]
          lines[first_assert:first_assert + 2] = [
              '    assert "⚠️ 資料不完整: 預期 19 檔 ETF，實際可用 13 檔" in out',
              '    assert "缺少目標日持倉: 00401A" in out',
          ]

          path.write_text("\n".join(lines) + "\n", encoding="utf-8")
          PY

      - name: Commit test alignment
        run: |
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/test_nightly_pipeline.py
          git commit -m "test: align nightly warning with persisted coverage"
          git push origin HEAD:fix/90-nightly-persisted-coverage
