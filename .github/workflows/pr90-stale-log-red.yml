name: PR90 stale log RED

on:
  push:
    branches:
      - fix/73-stale-scrape-status

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
      - name: Update expected stale log
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_nightly_pipeline.py')
          text = path.read_text(encoding='utf-8')
          old = '    assert "PROVISIONAL REPORT" in out\n'
          new = '    assert "STALE SCRAPE" in out\n'
          if text.count(old) != 1:
              raise SystemExit('unexpected stale log assertion count')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY
      - name: Remove temporary workflow and commit RED
        run: |
          rm .github/workflows/pr90-stale-log-red.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add tests/test_nightly_pipeline.py .github/workflows/pr90-stale-log-red.yml
          git commit -m "test: require non-misleading stale scrape log"
          git push origin HEAD:fix/73-stale-scrape-status
