              "remove scrape persistence helpers",
          )
          # get_last_scrape_date is the final function in the file.
          last_marker = "def get_last_scrape_date(etf_code):\\n"
          index = text.find(last_marker)
          if index < 0:
              raise RuntimeError("remove get_last_scrape_date: marker not found")
          text = text[:index].rstrip() + "\\n"
          write(path, text)
          '''
          new = '''scrape_tail = text.find('_USABLE_SCRAPE_STATUSES = {"success", "stale"}\\n')
          if scrape_tail < 0:
              raise RuntimeError("scrape persistence tail marker not found")
          text = text[:scrape_tail].rstrip() + "\\n"
          write(path, text)
          '''
          if text.count(old) != 1:
              raise RuntimeError(f"scrape tail helper block matches: {text.count(old)}")
          text = text.replace(old, new, 1)

          supplement = r'''

# Supplemental cleanup for consumers whose assertions described the removed table.
path = "scripts/db.py"
text = read(path)
text = replace_once(
    text,
    '''def get_eligible_etf_codes(as_of_date):
    """Return ETFs that belonged to the tracked universe on ``as_of_date``."""
    as_of_date = _serialize(as_of_date)
''',
    '''def get_eligible_etf_codes(as_of_date):
    """Return ETFs that belonged to the tracked universe on ``as_of_date``."""
    from etf_universe import ensure_seeded

    ensure_seeded()
    as_of_date = _serialize(as_of_date)
''',
    "seed universe before coverage",
)
text = text.replace('    filters = ""\n', '')
text = text.replace('        filters = "WHERE date < ?"\n', '')
write(path, text)

path = "scripts/report.py"
text = read(path)
text = replace_once(
