name: Holdings source GREEN

on:
  push:
    branches:
      - fix/73-stale-scrape-status
    paths:
      - .github/workflows/holdings-source-green.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Prepare helper
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path("scripts/_apply_holdings_source_green.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              "return text[:start_index] + replacement + text[end_index:]",
              "return text[:start_index] + replacement + text[end_index + len(end):]",
          )
          text = text.replace(
              '"def detect_holding_changes(\\n",',
              '"def detect_holding_changes(",',
          )
          start = text.index("text = replace_between(\n    text,\n    '_USABLE_SCRAPE_STATUSES")
          end = text.index("\n\n# models.py", start)
          replacement = '''scrape_tail = text.find('_USABLE_SCRAPE_STATUSES = {"success", "stale"}\\n')
          if scrape_tail < 0:
              raise RuntimeError("scrape persistence tail marker not found")
          text = text[:scrape_tail].rstrip() + "\\n"
          write(path, text)
          '''
          path.write_text(text[:start] + replacement + text[end:], encoding="utf-8")
          PY
      - name: Apply and verify
        env:
          PYTHONPATH: scripts
        run: |
          set +e
          RESULT=holdings-green-result.txt
          : > "$RESULT"

          echo "=== APPLY ===" >> "$RESULT"
          python scripts/_apply_holdings_source_green.py >> "$RESULT" 2>&1
          STATUS=$?
          if [ "$STATUS" -eq 0 ]; then
            python scripts/_apply_holdings_source_supplement.py >> "$RESULT" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            python scripts/_apply_holdings_source_targeted_fix.py >> "$RESULT" 2>&1
            STATUS=$?
          fi
          if [ "$STATUS" -eq 0 ]; then
            python scripts/_apply_holdings_source_collection_cleanup.py >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== REMAINING REFERENCES ===" >> "$RESULT"
            grep -RIn "etf_scrape_runs\|insert_scrape_run\|ScrapeRun\|successful_snapshot_exists" scripts tests README.md >> "$RESULT" 2>&1 || true
            echo "=== INSTALL ===" >> "$RESULT"
            pip install -r requirements.txt >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== TARGETED ===" >> "$RESULT"
            pytest -q \
              tests/test_holdings_source_of_truth.py \
              tests/test_retry_stale_scrapes.py \
              tests/test_pipeline_date_contract.py \
              tests/test_changes.py \
              tests/test_signal_report.py \
              tests/test_nightly_pipeline.py \
              tests/test_date_semantics_final_review.py \
              tests/test_preexisting_successful_snapshots.py >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== FULL ===" >> "$RESULT"
            pytest -q >> "$RESULT" 2>&1
            STATUS=$?
          fi

          echo "STATUS=$STATUS" >> "$RESULT"
          exit 0
      - name: Commit outcome
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if grep -q '^STATUS=0$' holdings-green-result.txt; then
            rm holdings-green-result.txt
            rm scripts/_apply_holdings_source_green.py
            rm scripts/_apply_holdings_source_supplement.py
            rm scripts/_apply_holdings_source_targeted_fix.py
            rm scripts/_apply_holdings_source_collection_cleanup.py
            rm .github/workflows/holdings-source-green.yml
            git add -A
            git commit -m "refactor: make holdings the freshness source of truth"
          else
            git add holdings-green-result.txt
            git commit -m "chore: capture holdings-source GREEN failure"
          fi
          git push origin HEAD:fix/73-stale-scrape-status
