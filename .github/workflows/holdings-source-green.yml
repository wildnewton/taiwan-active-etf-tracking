name: Holdings source GREEN

on:
  push:
    branches:
      - fix/73-stale-scrape-status
    paths:
      - .github/workflows/holdings-source-green.yml

permissions:
  contents: write

jobs:
  apply-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/73-stale-scrape-status
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Apply and verify
        env:
          PYTHONPATH: scripts
        run: |
          set +e
          RESULT=holdings-green-result.txt
          : > "$RESULT"

          python - <<'PY'
          from pathlib import Path

          path = Path("scripts/_apply_holdings_source_green.py")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              'return text[:start_index] + replacement + text[end_index:]',
              'return text[:start_index] + replacement + text[end_index + len(end):]',
          )
          text = text.replace(
              '"def detect_holding_changes(\\n",',
              '"def detect_holding_changes(",',
          )
          old = '''text = replace_between(
              text,
              '_USABLE_SCRAPE_STATUSES = {"success", "stale"}\\n',
              "def get_last_scrape_date(etf_code):\\n",
              "",
              "remove scrape persistence helpers",
          )
          # get_last_scrape_date is the final function in the file.
          last_marker = "def get_last_scrape_date(etf_code):\\n"
          index = text.find(last_marker)
          if index < 0:
              raise RuntimeError("remove get_last_scrape_date: marker not found")
          text = text[:index].rstrip() + "\\n"
          write(path, text)
          '''
          new = '''scrape_tail = text.find('_USABLE_SCRAPE_STATUSES = {"success", "stale"}\\n')
          if scrape_tail < 0:
              raise RuntimeError("scrape persistence tail marker not found")
          text = text[:scrape_tail].rstrip() + "\\n"
          write(path, text)
          '''
          if text.count(old) != 1:
              raise RuntimeError(f"scrape tail helper block matches: {text.count(old)}")
          path.write_text(text.replace(old, new, 1), encoding="utf-8")
          PY

          echo "=== APPLY ===" >> "$RESULT"
          python scripts/_apply_holdings_source_green.py >> "$RESULT" 2>&1
          STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            echo "=== REMAINING REFERENCES ===" >> "$RESULT"
            grep -RIn "etf_scrape_runs\|insert_scrape_run\|ScrapeRun\|successful_snapshot_exists" scripts tests README.md >> "$RESULT" 2>&1 || true

            echo "=== INSTALL ===" >> "$RESULT"
            pip install -r requirements.txt >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== TARGETED ===" >> "$RESULT"
            pytest -q \
              tests/test_holdings_source_of_truth.py \
              tests/test_retry_stale_scrapes.py \
              tests/test_pipeline_date_contract.py \
              tests/test_changes.py \
              tests/test_signal_report.py \
              tests/test_nightly_pipeline.py >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== FULL ===" >> "$RESULT"
            pytest -q >> "$RESULT" 2>&1
            STATUS=$?
          fi

          echo "STATUS=$STATUS" >> "$RESULT"
          exit 0
      - name: Commit outcome
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if grep -q '^STATUS=0$' holdings-green-result.txt; then
            rm holdings-green-result.txt
            rm scripts/_apply_holdings_source_green.py
            rm .github/workflows/holdings-source-green.yml
            git add -A
            git commit -m "refactor: make holdings the freshness source of truth"
          else
            git add holdings-green-result.txt
            git commit -m "chore: capture holdings-source GREEN failure"
          fi
          git push origin HEAD:fix/73-stale-scrape-status
