             return_value={
                 "actual_count": 19,
                 "expected_count": 19,
                 "missing_etfs": [],
             },
         ), \\
         patch("discover_active_etfs.discover_and_reconcile", return_value=DISCOVERY), \\
         patch("pipeline.run_daily_scrape_with_browser", return_value=STALE_SCRAPE), \\
         patch("changes.detect_holding_changes", return_value=NO_SKIP_CHANGES) as changes, \\
         patch("manager_intent.generate_manager_intent_rollups", return_value=MANAGER_INTENT_SUMMARY) as intent, \\
         patch("signals.generate_manager_signals", return_value={}) as signals, \\
         patch("report.generate_signal_report", return_value="") as report, \\
         patch("traction_analysis.generate_traction_report", return_value="") as traction:
        _run_main(str(tmp_path / "t.sqlite3"), str(tmp_path / "r"))

    out = capsys.readouterr().out
    assert "Data freshness" in out
    assert "fresh 5" in out and "stale 14" in out
    assert "STALE SCRAPE" in out
    assert "00401A" in out and "2026-06-25" in out
    changes.assert_called_once_with(current_date="2026-06-26")
    intent.assert_called_once_with("2026-06-26")
    signals.assert_called_once_with("2026-06-26")
    report.assert_called_once_with("2026-06-26", quality_run_date="2026-06-26")
    traction.assert_called_once()


'''
    + "def test_warns_when_skipped_etfs(capsys, tmp_path):\n",
    "rewrite nightly stale diagnostic test",
)
write(path, text)
'''
          path.write_text(text + supplement, encoding="utf-8")
          PY
      - name: Apply and verify
        env:
          PYTHONPATH: scripts
        run: |
          set +e
          RESULT=holdings-green-result.txt
          : > "$RESULT"

          echo "=== APPLY ===" >> "$RESULT"
          python scripts/_apply_holdings_source_green.py >> "$RESULT" 2>&1
          STATUS=$?

          if [ "$STATUS" -eq 0 ]; then
            echo "=== REMAINING REFERENCES ===" >> "$RESULT"
            grep -RIn "etf_scrape_runs\|insert_scrape_run\|ScrapeRun\|successful_snapshot_exists" scripts tests README.md >> "$RESULT" 2>&1 || true

            echo "=== INSTALL ===" >> "$RESULT"
            pip install -r requirements.txt >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== TARGETED ===" >> "$RESULT"
            pytest -q \
              tests/test_holdings_source_of_truth.py \
              tests/test_retry_stale_scrapes.py \
              tests/test_pipeline_date_contract.py \
              tests/test_changes.py \
              tests/test_signal_report.py \
              tests/test_nightly_pipeline.py >> "$RESULT" 2>&1
            STATUS=$?
          fi

          if [ "$STATUS" -eq 0 ]; then
            echo "=== FULL ===" >> "$RESULT"
            pytest -q >> "$RESULT" 2>&1
            STATUS=$?
          fi

          echo "STATUS=$STATUS" >> "$RESULT"
          exit 0
      - name: Commit outcome
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if grep -q '^STATUS=0$' holdings-green-result.txt; then
            rm holdings-green-result.txt
            rm scripts/_apply_holdings_source_green.py
            rm .github/workflows/holdings-source-green.yml
            git add -A
            git commit -m "refactor: make holdings the freshness source of truth"
          else
            git add holdings-green-result.txt
            git commit -m "chore: capture holdings-source GREEN failure"
          fi
          git push origin HEAD:fix/73-stale-scrape-status
