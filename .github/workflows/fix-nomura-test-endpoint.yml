name: Update Nomura endpoint fixtures

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  update:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: true

      - name: Replace stale endpoint fixtures
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("tests/test_official_playwright_waits.py")
          text = path.read_text(encoding="utf-8")
          old = "https://www.nomurafunds.com.tw/api/getfundassets"
          new = "https://www.nomurafunds.com.tw/API/ETFAPI/api/Fund/GetFundAssets"
          count = text.count(old)
          if count != 4:
              raise SystemExit(f"expected four stale Nomura URLs, found {count}")
          path.write_text(text.replace(old, new), encoding="utf-8")
          PY
          rm .github/workflows/fix-nomura-test-endpoint.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "test: use real Nomura API endpoint"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
