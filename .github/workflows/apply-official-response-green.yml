name: Apply official response fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1
          persist-credentials: true

      - name: Apply GREEN patch
        run: |
          git apply --check .github/official-response-green.patch
          git apply .github/official-response-green.patch
          rm .github/official-response-green.patch
          rm .github/workflows/apply-official-response-green.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden official API response handling"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
